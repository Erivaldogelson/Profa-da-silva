<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <title>Login | Cadastro</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />

  <!-- Bootstrap -->
  <link
    href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css"
    rel="stylesheet"
  />

  <link rel="stylesheet" href="style.css" />
</head>

<body>
  <div class="container-fluid login-bg">

    <!-- Papel topo -->
    <div class="papel-topo"></div>

    <!-- Card -->
    <div class="d-flex align-items-center justify-content-center content">
      <div class="card login-card shadow-lg">
        <div class="card-body p-4">

          <div class="icon-top">
            <img src="assets/chapeu.png" alt="Formatura">
          </div>

          <h2 id="formTitle" class="text-center mb-4 titulo">Login</h2>

          <form>
            <div id="nomeGroup" class="mb-3 d-none">
              <label class="form-label">Nome</label>
              <input type="text" class="form-control" />
            </div>

            <div class="mb-3">
              <label class="form-label">Email</label>
              <input type="email" class="form-control" required />
            </div>

            <div class="mb-3">
              <label class="form-label">Senha</label>
              <input type="password" class="form-control" required />
            </div>

            <button class="btn btn-custom w-100 mt-3">Entrar</button>
          </form>

          <p class="text-center mt-3 toggle-text">
            Não tem conta?
            <span id="toggleForm">Cadastre-se</span>
          </p>

        </div>
      </div>
    </div>

  </div>

  <script src="login.js"></script>
</body>
</html>
