<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <title>Login | Cadastro</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />

  <!-- Bootstrap -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet"/>

  <!-- Bootstrap Icons -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet"/>

  <link rel="stylesheet" href="style.css" />
</head>

<body>
  <div class="container-fluid login-bg">
    <div class="papel-topo"></div>

    <div class="d-flex align-items-center justify-content-center content">
      <div class="card login-card shadow-lg">
        <div class="card-body p-4">

          <div class="icon-top text-center mb-3">
            <img src="assets/chapeu.png" width="70">
          </div>

          <h2 id="formTitle" class="text-center mb-4">Login</h2>

          <form id="formAuth">

            <div id="nomeGroup" class="mb-3 d-none">
              <label class="form-label">Nome</label>
              <input type="text" class="form-control" />
            </div>

            <div id="dataGroup" class="mb-3 d-none">
              <label class="form-label">Data de nascimento</label>
              <input type="date" class="form-control" />
            </div>

            <div id="telefoneGroup" class="mb-3 d-none">
              <label class="form-label">Telefone</label>
              <input type="tel" class="form-control" />
            </div>

            <div class="mb-3">
              <label class="form-label">Email</label>
              <input type="email" class="form-control" required />
            </div>

            <div class="mb-3">
              <label class="form-label">Senha</label>
              <div class="input-group">
                <input type="password" id="senhaInput" class="form-control" required />
                <span class="input-group-text toggle-password" id="toggleSenha">
                  <i class="bi bi-eye"></i>
                </span>
              </div>
            </div>

            <button class="btn btn-custom w-100 mt-3">Entrar</button>
          </form>

          <!-- GOOGLE -->
          <button id="googleLogin" class="btn btn-outline-dark w-100 mt-3">
            <i class="bi bi-google me-2"></i> Entrar com Google
          </button>

          <p class="text-center mt-3">
            Não tem conta?
            <span id="toggleForm" style="cursor:pointer;font-weight:600">
              Cadastre-se
            </span>
          </p>

        </div>
      </div>
    </div>
  </div>

  <script type="module" src="firebase.js"></script>
  <script type="module" src="login.js"></script>
</body>
</html>
