<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <title>Planos de Aulas</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
  <link rel="stylesheet" href="planos.css">
</head>

<body>
  <main class="container py-5">
    <div class="payment-topbar mb-4">
      <a class="btn btn-back" href="/voltar-login">
        <i class="bi bi-arrow-left"></i>
        Voltar para login e cadastro
      </a>
      <a id="gestao-link" class="btn btn-back" href="/gestao/" hidden>
        <i class="bi bi-shield-lock"></i>
        Gestão
      </a>
    </div>

    <div class="text-center mb-5">
      <h1 class="fw-bold">Escolha seu plano de estudos</h1>
      <p class="text-muted">Selecione a matéria e o plano desejado</p>
      <div id="payment-feedback" class="payment-feedback" role="status" aria-live="polite"></div>
    </div>

    <div id="plans-catalog" class="plans-catalog">
      <p class="text-center text-muted">Carregando planos...</p>
    </div>
  </main>

  <script src="/theme.js?v=20260515-theme"></script>
  <script src="planos.js?v=20260515-theme"></script>
</body>
</html>
