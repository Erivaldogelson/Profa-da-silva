<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Nova senha | Profª Da Silva</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@600;700&family=Nunito:wght@400;600;700&display=swap" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="auth.css">
</head>
<body>
  <main class="container py-5">
    <div class="row justify-content-center">
      <div class="col-lg-5">
        <section class="plan-card auth-panel">
          <div class="text-center mb-4 auth-header">
            <h1 class="fw-bold">Criar nova senha</h1>
            <p class="text-muted mb-0">Defina uma senha nova para concluir a recuperação da conta.</p>
          </div>

          <div id="reset-feedback" class="feedback" aria-live="polite"></div>

          <form id="reset-password-form" class="auth-form is-visible">
            <div class="mb-3">
              <label class="form-label">Nova senha</label>
              <input class="form-control auth-control" type="password" name="password" placeholder="Digite a nova senha" minlength="6" required>
            </div>

            <div class="mb-3">
              <label class="form-label">Confirmar nova senha</label>
              <input class="form-control auth-control" type="password" name="confirmPassword" placeholder="Repita a nova senha" minlength="6" required>
            </div>

            <button class="btn btn-plan w-100 mb-2" type="submit">Salvar nova senha</button>
            <a class="btn btn-outline-dark w-100 rounded-pill" href="/login.html">Voltar para login</a>
          </form>
        </section>
      </div>
    </div>
  </main>

  <script src="reset-password.js"></script>
</body>
</html>
